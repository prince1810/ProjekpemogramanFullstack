<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login User - SIMKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-blue-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-user text-2xl"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-800">Login User</h2>
            <p class="text-gray-500 text-sm">Masuk untuk sampaikan keluhan Anda</p>
        </div>

        <form id="loginUserForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Email</label>
                <input type="email" id="email" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="email@anda.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Password</label>
                <input type="password" id="password" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition transform hover:-translate-y-1">
                Masuk Sekarang
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-500">
            Belum punya akun? <a href="register.html" class="text-blue-600 font-bold hover:underline">Daftar di sini</a>
        </p>
        <div class="text-center mt-4">
            <a href="index.html" class="text-xs text-gray-400 hover:text-gray-600"><i class="fas fa-arrow-left mr-1"></i> Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        document.getElementById('loginUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                username: document.getElementById('email').value, // kirim email sebagai username
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (res.ok && result.role === 'user') {
                    localStorage.setItem('isUser', 'true');
                    localStorage.setItem('userNama', result.nama);
                    localStorage.setItem('userEmail', result.email);
                    window.location.href = 'index.html';
                } else {
                    Swal.fire('Gagal!', 'Email atau password salah untuk akun user.', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Server tidak merespon.', 'error');
            }
        });
    </script>
</body>
</html>
