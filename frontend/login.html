<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - SIMKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-800 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
        
        <a href="index.html" class="text-sm text-gray-400 hover:text-blue-600 transition inline-block mb-6">
            <i class="fas fa-arrow-left mr-1"></i> Kembali
        </a>

        <div class="text-center mb-8">
            <div class="bg-gray-800 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-user-shield text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Admin Panel</h2>
            <p class="text-xs text-gray-500">Silakan masuk untuk mengelola sistem</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Username</label>
                <input type="text" id="user" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Password</label>
                <input type="password" id="pass" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold shadow transition transform hover:-translate-y-0.5">
                Masuk Sistem
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                const res = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: document.getElementById('user').value, 
                        password: document.getElementById('pass').value 
                    })
                });
                
                const result = await res.json();

                if (res.ok) {
                    localStorage.setItem('isAdmin', 'true'); // Simpan kunci masuk
                    window.location.href = 'admin.html'; // Pindah ke dashboard
                } else {
                    Swal.fire('Gagal Login', result.message, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Gagal terhubung ke server.', 'error');
            }
        });
    </script>
</body>
</html>
